services:
  frontend:
    build:
      context: ./aperol-maps-frontend
      args:
        - VITE_PUBLIC_URL=http://${VITE_PUBLIC_URL}
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy

  api:
    build:
      context: ./API
    ports:
      - "8000:8000"
    env_file:
      - ./API/.env 
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 10s
  

  redis:
    image: "redis:alpine"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 30

  redis-insight:
    image: "redis/redisinsight:latest"
    ports:
      - "8001:8001"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - redisinsight_data:/db

  crawler:
    build:
      context: ./data-aquisition
    command: python crawler.py
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - REDIS_HOST=redis
      - PYTHONUNBUFFERED=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy

  update_processor:
    build:
      context: ./data-aquisition
    command: python update_processor.py
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - REDIS_HOST=redis
      - PYTHONUNBUFFERED=1
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  cleaner:
    build:
      context: ./data-aquisition
    command: python cleaner.py
    environment:
      - REDIS_HOST=redis
      - PYTHONUNBUFFERED=1
    depends_on:
      redis:
        condition: service_healthy

  uploader:
    build:
      context: ./data-aquisition
    command: python uploader.py
    environment:
      - REDIS_HOST=redis
      - PYTHONUNBUFFERED=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
  redisinsight_data: